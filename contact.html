<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Luminex Codes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DO DOST</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="service.html">Services</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="contact-container">
        <div class="contact-box">
            <div class="contact-info">
                <h2>Bhai Se Baat Karo</h2>
                <p>Koi project hai ya game discuss karna hai? Message dalo!</p>
                
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <span>yourname@email.com</span>
                </div>
                <div class="info-item">
                    <i class="fab fa-instagram"></i>
                    <span>@luminexcodes_cpu</span>
                </div>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="Tumhara Naam" required>
                <input type="email" placeholder="Tumhara Email" required>
                <textarea placeholder="Tumhara Message" rows="5" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Luminex Codes | Always Online</p>
    </footer>

</body>
</html>
